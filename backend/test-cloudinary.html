<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloudinary Upload Tester</title>
  <style>
    :root {
      --primary: #4F46E5;
      --bg: #F9FAFB;
      --text: #111827;
      --border: #E5E7EB;
    }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      max-width: 600px;
      margin: 40px auto;
      padding: 20px;
    }
    .card {
      background: white;
      border: 1px solid var(--border);
      padding: 24px;
      margin-bottom: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    h1 { font-size: 1.5rem; margin-bottom: 24px; }
    h2 { font-size: 1.2rem; margin-bottom: 16px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
    input, select {
      display: block;
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 10px;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    button:hover { background-color: #4338CA; }
    pre {
      background: #1F2937;
      color: #D1D5DB;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 0.85rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .file-input-wrapper {
      margin-bottom: 12px;
    }
    #imagePreview img {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 16px;
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>
  <h1>Cloudinary Upload Flow Test</h1>

  <div class="card">
    <h2>1. Authenticate User</h2>
    <input type="email" id="email" placeholder="Email address" value="admin@varanda.com">
    <input type="password" id="password" placeholder="Password" value="password123">
    <button onclick="login()">Login</button>
    <pre id="loginResult">Awaiting login...</pre>
  </div>

  <div class="card">
    <h2>2. Test Uploads</h2>
    <select id="uploadType">
      <option value="logo">Business Logo (Image)</option>
      <option value="document">Business Document (PDF/Image)</option>
      <option value="product">Product Image</option>
    </select>
    
    <div class="file-input-wrapper">
      <input type="file" id="fileInput" accept="image/*,application/pdf">
    </div>
    
    <button onclick="uploadFile()">Get Signature & Upload to Cloudinary</button>
    
    <pre id="uploadResult">Awaiting upload...</pre>
    <div id="imagePreview"></div>
  </div>

  <script>
    // Adjust to your local or deployed API URL
    const API_BASE = 'http://localhost:4000/api/v1'; 
    let accessToken = '';

    async function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      document.getElementById('loginResult').textContent = 'Logging in...';

      try {
        const res = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        
        if (data.success) {
          accessToken = data.data.accessToken;
          document.getElementById('loginResult').textContent = `Success!\nAccess Token:\n${accessToken.substring(0, 40)}...`;
        } else {
          document.getElementById('loginResult').textContent = `Login failed:\n${JSON.stringify(data, null, 2)}`;
        }
      } catch (err) {
        document.getElementById('loginResult').textContent = `Network Error:\n${err.message}`;
      }
    }

    async function uploadFile() {
      if (!accessToken) return alert('Please login first to get an access token.');
      
      const fileInput = document.getElementById('fileInput');
      if (!fileInput.files.length) return alert('Please select a file to upload.');
      
      const file = fileInput.files[0];
      const type = document.getElementById('uploadType').value;
      const resultBox = document.getElementById('uploadResult');
      const previewBox = document.getElementById('imagePreview');
      
      previewBox.innerHTML = ''; // Clear old preview
      
      try {
        resultBox.textContent = '1/2 Requesting signature from backend...';
        
        // 1. GET SIGNATURE FROM BACKEND
        // We pass context='test_upload' just as an example
        const signRes = await fetch(`${API_BASE}/cloudinary/sign?type=${type}&context=test_upload`, {
          headers: { 'Authorization': `Bearer ${accessToken}` }
        });
        const signData = await signRes.json();
        
        if (!signData.success) {
          throw new Error('Failed to get signature:\n' + JSON.stringify(signData, null, 2));
        }
        
        const params = signData.data;
        resultBox.textContent = `1/2 Signature acquired.\n2/2 Uploading directly to Cloudinary URL:\n${params.upload_url}...`;

        // 2. UPLOAD TO CLOUDINARY
        // IMPORTANT: Every parameter included in the signature must be passed in the FormData!
        const formData = new FormData();
        formData.append('file', file);
        formData.append('api_key', params.api_key);
        formData.append('timestamp', params.timestamp);
        formData.append('signature', params.signature);
        formData.append('folder', params.folder);
        formData.append('allowed_formats', params.allowed_formats);
        formData.append('max_file_size', params.max_file_size);
        
        // If the backend generated a public_id (like for documents), append it too
        if (params.public_id) {
          formData.append('public_id', params.public_id);
        }

        const uploadRes = await fetch(params.upload_url, {
          method: 'POST',
          body: formData
        });
        
        const uploadResult = await uploadRes.json();
        
        if (uploadResult.error) {
          throw new Error('Cloudinary Upload Error:\n' + JSON.stringify(uploadResult.error, null, 2));
        }

        resultBox.textContent = `Upload Successful!\n\nSecure URL:\n${uploadResult.secure_url}\n\nPublic ID:\n${uploadResult.public_id}`;
        
        // Show preview if it's an image
        if (uploadResult.resource_type === 'image') {
          previewBox.innerHTML = `<img src="${uploadResult.secure_url}" alt="Uploaded image">`;
        } else {
          previewBox.innerHTML = `<a href="${uploadResult.secure_url}" target="_blank" style="color:var(--primary); font-weight:600; display:block; margin-top:16px;">View Uploaded Document</a>`;
        }
        
      } catch (err) {
        resultBox.textContent = err.message;
        console.error(err);
      }
    }
  </script>
</body>
</html>
